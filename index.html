<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeneControl</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <h1>BeneControl</h1>

  <input type="password" id="senha" placeholder="Crie ou digite sua senha">
  <input type="password" id="confirmarSenha" placeholder="Confirme a senha (primeira vez)">

  <button onclick="login()">Entrar</button>
</div>

<!-- MENU -->
<div id="menuScreen" class="screen">
  <h1>BeneControl</h1>

  <div class="grid">
    <div onclick="openScreen('pessoalScreen')">👤 Pessoal</div>
    <div onclick="openScreen('beneappsScreen')">🏢 BeneApps</div>
    <div onclick="openScreen('projetosScreen')">💻 Projetos</div>
    <div onclick="openScreen('planejamentoScreen')">📊 Planejamento</div>
  </div>

  <img src="assets/logo-beneapps.png" class="logo">
</div>

<!-- PESSOAL -->
<div id="pessoalScreen" class="screen">
  <button onclick="voltar()">← Voltar</button>
  <h2>Pessoal</h2>
</div>

<!-- BENEAPPS -->
<div id="beneappsScreen" class="screen">
  <button onclick="voltar()">← Voltar</button>
  <h2>BeneApps</h2>
</div>

<!-- PROJETOS -->
<div id="projetosScreen" class="screen">
  <button onclick="voltar()">← Voltar</button>
  <h2>Projetos</h2>
</div>

<!-- PLANEJAMENTO -->
<div id="planejamentoScreen" class="screen">
  <button onclick="voltar()">← Voltar</button>
  <h2>Planejamento</h2>
</div>

<script src="app.js"></script>
</body>
</html>
